---
# ============================================================================
# GitLab CI/CD Pipeline for Ansible Role HAProxy + Keepalived
# ============================================================================
# This pipeline runs linting, testing, and publishes to Ansible Galaxy
# ============================================================================

stages:
  - lint
  - test
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  ANSIBLE_FORCE_COLOR: "1"
  PY_COLORS: "1"

cache:
  paths:
    - .cache/pip
    - venv/

# ============================================================================
# Lint Stage
# ============================================================================

yamllint:
  stage: lint
  image: python:3.11-slim
  before_script:
    - pip install yamllint
  script:
    - yamllint .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\/.*/'

ansible-lint:
  stage: lint
  image: python:3.11-slim
  before_script:
    - pip install ansible-lint
  script:
    - ansible-lint
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\/.*/'

# ============================================================================
# Test Stage - Molecule Tests on Multiple Distributions
# ============================================================================

.molecule_test:
  stage: test
  image: python:3.11
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apt-get update && apt-get install -y docker.io
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - molecule test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\/.*/'

molecule:ubuntu2404:
  extends: .molecule_test
  variables:
    MOLECULE_DISTRO: ubuntu2404

molecule:ubuntu2204:
  extends: .molecule_test
  variables:
    MOLECULE_DISTRO: ubuntu2204

molecule:debian12:
  extends: .molecule_test
  variables:
    MOLECULE_DISTRO: debian12

molecule:debian11:
  extends: .molecule_test
  variables:
    MOLECULE_DISTRO: debian11


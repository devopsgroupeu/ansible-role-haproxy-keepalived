---
# ============================================================================
# GitLab CI/CD Pipeline for Ansible Role HAProxy + Keepalived
# ============================================================================

stages:
  - lint
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  ANSIBLE_FORCE_COLOR: "1"
  PY_COLORS: "1"

cache:
  paths:
    - .cache/pip
    - venv/

# ============================================================================
# Lint Stage
# ============================================================================

yamllint:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install "yamllint>=1.35.0,<2.0.0"
  script:
    - >
      yamllint
      .gitlab-ci.yml
      .yamllint
      defaults/
      handlers/
      meta/
      molecule/
      tasks/
      templates/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^feat\/.*/'

ansible-lint:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install "ansible-lint>=25.0.0" "ansible-core>=2.19,<2.22"
  script:
    - ansible-lint
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^feat\/.*/'

# ============================================================================
# Test Stage - Molecule Tests on Supported Distributions
# ============================================================================

.molecule_test:
  stage: test
  image: python:3.12
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apt-get update && apt-get install -y docker.io
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - molecule test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^feat\/.*/'

molecule:ubuntu2404:
  extends: .molecule_test
  variables:
    MOLECULE_DISTRO: ubuntu2404

molecule:debian12:
  extends: .molecule_test
  variables:
    MOLECULE_DISTRO: debian12

molecule:debian13:
  extends: .molecule_test
  variables:
    MOLECULE_DISTRO: debian13

molecule:rockylinux9:
  extends: .molecule_test
  variables:
    MOLECULE_DISTRO: rockylinux9

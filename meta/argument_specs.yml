---
argument_specs:
  main:
    short_description: Install and configure HAProxy + Keepalived for HA load balancing
    description: >
      Installs HAProxy (package by default, source opt-in) and Keepalived
      VRRP, renders validated configs, wires a floating VIP with
      FAULT-on-failure failover, and optionally drives a Hetzner Cloud
      floating IP.
    author:
      - DevOpsGroup
    options:
      loadbalancer_master:
        type: str
        required: true
        description: inventory_hostname of the master proxy node.
      loadbalancer_backup:
        type: str
        required: true
        description: inventory_hostname of the backup proxy node.
      haproxy_enabled:
        type: bool
        required: false
        default: true
        description: Install and configure HAProxy.
      haproxy_version:
        type: str
        required: false
        default: "3.4.0"
        description: HAProxy source version (used only when haproxy_install_method=source).
      haproxy_install_method:
        type: str
        required: false
        default: package
        choices: [package, source]
        description: >
          Installation method for HAProxy. 'package' (default) installs from the
          distro/PPA repository; 'source' compiles from the official tarball.
      haproxy_branch:
        type: str
        required: false
        default: ""
        description: >
          Optional repo branch for package mode (e.g. "3.0" or "3.4"). Selects
          the vbernat PPA (Ubuntu) or haproxy.debian.net backport (Debian) for
          that branch. Empty = use the distribution's default HAProxy package.
      haproxy_binary:
        type: str
        required: false
        default: "{{ '/usr/local/sbin/haproxy' if haproxy_install_method == 'source' else '/usr/sbin/haproxy' }}"
        description: >
          Absolute path to the haproxy binary. Automatically set based on
          haproxy_install_method; override only if your distro places it elsewhere.
      haproxy_make_flags_default:
        type: list
        elements: str
        required: false
        default:
          - "TARGET=linux-glibc"
          - "USE_OPENSSL=1"
          - "USE_PCRE2=1"
          - "USE_LUA=1"
          - "USE_SLZ=1"
          - "USE_SYSTEMD=1"
          - "USE_PROMEX=1"
          - "USE_PCRE2_JIT=1"
        description: >
          Base set of make flags for source-mode HAProxy builds. This is the
          baseline; haproxy_make_flags is the override point where QUIC flags
          are appended conditionally. Override haproxy_make_flags to fully
          customize the build without touching this base.
      haproxy_make_flags:
        type: raw
        required: false
        default: "{{ haproxy_make_flags_default + (['USE_QUIC=1', 'USE_QUIC_OPENSSL_COMPAT=1'] if haproxy_version is version('2.9', '>=') else []) }}"
        description: >
          Final list of make flags passed to the HAProxy build. Defaults to
          haproxy_make_flags_default plus QUIC flags on HAProxy >= 2.9.
          Override this var (not haproxy_make_flags_default) to fully replace
          the flag set.
      haproxy_src_sha256:
        type: str
        required: false
        default: ""
        description: >
          SHA256 checksum for the HAProxy source tarball; required when
          haproxy_install_method=source. Accepts "sha256:<hex>" or a remote
          ".sha256" URL. haproxy.org publishes a sidecar checksum file next
          to each release tarball.
      haproxy_remove_build_deps:
        type: bool
        required: false
        default: false
        description: >
          Purge the HAProxy build toolchain (gcc, make, etc.) after a source
          install to save space and reduce attack surface. Only effective in
          source mode.
      haproxy_offline_install:
        type: bool
        required: false
        default: false
        description: >
          When true, copy a pre-staged tarball from the Ansible controller
          (haproxy_src_local_path) instead of downloading from haproxy.org.
          Use for air-gapped environments.
      haproxy_src_local_path:
        type: str
        required: false
        default: ""
        description: >
          Path on the Ansible controller to a pre-staged HAProxy source tarball.
          Only used when haproxy_offline_install=true.
      haproxy_ssl_cert_src:
        type: str
        required: false
        default: ""
        description: >
          Path on the Ansible controller to a directory of SSL certificates to
          deploy into {{ haproxy_config_dir }}/certs/. Empty = no certs deployed.
      haproxy_install_dir:
        type: str
        required: false
        default: /usr/local/src
        description: >
          Directory on the target host where HAProxy and Keepalived source
          tarballs are downloaded and compiled (source mode only).
      haproxy_config:
        type: str
        required: false
        default: ""
        description: >
          Complete HAProxy configuration as a literal string. When set, overrides
          all dynamically generated configuration. Use for advanced custom configs
          or migration from an existing setup.
      haproxy_user:
        type: str
        required: false
        default: haproxy
        description: System user running HAProxy.
      haproxy_group:
        type: str
        required: false
        default: haproxy
        description: System group for HAProxy.
      haproxy_log_facility:
        type: str
        required: false
        default: local2
        choices: [local0, local1, local2, local3, local4, local5, local6, local7]
        description: Syslog facility for HAProxy logs.
      haproxy_mode:
        type: str
        required: false
        default: http
        choices: [http, tcp]
        description: Default proxy mode.
      haproxy_ssl_min_ver:
        type: str
        required: false
        default: "TLSv1.2"
        description: Minimum TLS version for all SSL binds (per-frontend override via ssl_min_ver).
      haproxy_ssl_default_bind_ciphers:
        type: str
        required: false
        description: Global ssl-default-bind-ciphers (TLS 1.2 cipher list).
      haproxy_ssl_default_bind_ciphersuites:
        type: str
        required: false
        description: Global ssl-default-bind-ciphersuites (TLS 1.3).
      haproxy_options:
        type: list
        elements: str
        required: false
        default:
          - httplog
          - dontlognull
          - forwardfor except 127.0.0.0/8
          - redispatch
        description: HAProxy defaults-section option lines.
      haproxy_retries:
        type: int
        required: false
        default: 3
        description: Connection retry attempts.
      haproxy_maxconn:
        type: int
        required: false
        default: 3000
        description: Maximum concurrent connections.
      haproxy_timeout_http_request:
        type: str
        required: false
        default: 10s
        description: Maximum time to receive a complete HTTP request.
      haproxy_timeout_connect:
        type: str
        required: false
        default: 10s
        description: Maximum time to establish a connection to a backend server.
      haproxy_timeout_client:
        type: str
        required: false
        default: 1m
        description: Maximum inactivity time on the client side.
      haproxy_timeout_server:
        type: str
        required: false
        default: 1m
        description: Maximum inactivity time on the server side.
      haproxy_timeout_http_keep_alive:
        type: str
        required: false
        default: 10s
        description: Maximum time to wait for a new HTTP request after a keep-alive.
      haproxy_timeout_check:
        type: str
        required: false
        default: 10s
        description: Maximum time for a health check to complete.
      haproxy_stats:
        type: bool
        required: false
        default: true
        description: Enable the HAProxy stats page.
      haproxy_stats_port:
        type: int
        required: false
        default: 1936
        description: Stats page port.
      haproxy_stats_admin:
        type: bool
        required: false
        default: false
        description: >-
          Enable the stats admin interface (live backend enable/disable).
          Off by default; basic auth is the only protection when enabled.
      haproxy_stats_bind_addr:
        type: str
        required: false
        default: "127.0.0.1"
        description: Stats page bind address.
      haproxy_stats_page_user:
        type: str
        required: false
        default: admin
        description: Stats page username.
      haproxy_stats_page_pass:
        type: str
        required: false
        default: admin
        no_log: true
        description: Stats page password (store in Vault; must not be 'admin').
      haproxy_stats_page_uri:
        type: str
        required: false
        default: /haproxy/stats
        description: Stats page URI.
      haproxy_frontends:
        type: list
        elements: dict
        required: false
        default: []
        description: HAProxy frontend definitions.
      haproxy_backend_default_balance:
        type: str
        required: false
        default: roundrobin
        description: Default load-balancing algorithm for backends.
      haproxy_backends:
        type: list
        elements: dict
        required: false
        default: []
        description: HAProxy backend definitions.
      haproxy_listen_default_balance:
        type: str
        required: false
        default: roundrobin
        description: Default load-balancing algorithm for listen sections.
      haproxy_listens:
        type: list
        elements: dict
        required: false
        default: []
        description: HAProxy listen-section definitions.
      haproxy_config_dir:
        type: str
        required: false
        default: /etc/haproxy
        description: HAProxy config directory.
      haproxy_socket_dir:
        type: str
        required: false
        default: /var/lib/haproxy
        description: HAProxy runtime/chroot directory.
      haproxy_admin_socket_dir:
        type: path
        required: false
        default: /run/haproxy
        description: Directory for the admin runtime socket; must be outside the chroot.
      haproxy_admin_socket:
        type: path
        required: false
        default: /run/haproxy/admin.sock
        description: Admin runtime socket path (level admin, expose-fd listeners).
      haproxy_hard_stop_after:
        type: str
        required: false
        default: "30s"
        description: Time after a reload before old workers are hard-stopped.
      keepalived_enabled:
        type: bool
        required: false
        default: true
        description: Install and configure Keepalived.
      keepalived_version:
        type: str
        required: false
        default: "2.3.4"
        description: Keepalived source version (used only when keepalived_install_method=source).
      keepalived_src_sha256:
        type: str
        required: false
        default: ""
        description: >
          SHA256 checksum for the Keepalived source tarball; required when
          keepalived_install_method=source. Accepts "sha256:<hex>" or a remote
          ".sha256" URL.
      keepalived_install_method:
        type: str
        required: false
        default: package
        choices: [package, source]
        description: >
          Installation method for Keepalived. 'package' (default) installs from
          the distro repository; 'source' compiles from the official tarball.
      keepalived_binary:
        type: str
        required: false
        default: "{{ '/usr/local/sbin/keepalived' if keepalived_install_method == 'source' else '/usr/sbin/keepalived' }}"
        description: >
          Absolute path to the keepalived binary. Automatically set based on
          keepalived_install_method; override only if your distro places it elsewhere.
      keepalived_configure_flags_default:
        type: list
        elements: str
        required: false
        default:
          - "--with-init=systemd"
          - "--enable-snmp"
          - "--enable-bfd"
        description: >
          Base set of ./configure flags for source-mode Keepalived builds. This is
          the baseline; keepalived_configure_flags is the override point. Override
          keepalived_configure_flags (not this var) to fully replace the flag set.
      keepalived_configure_flags:
        type: list
        elements: str
        required: false
        default: "{{ keepalived_configure_flags_default }}"
        description: >
          Final list of ./configure flags passed to the Keepalived build. Defaults
          to keepalived_configure_flags_default. Override this var to fully replace
          the configure flag set.
      keepalived_remove_build_deps:
        type: raw
        required: false
        default: "{{ haproxy_remove_build_deps }}"
        description: >
          Purge the Keepalived build toolchain (gcc, make, etc.) after a source
          install. Defaults to the value of haproxy_remove_build_deps for back-compat.
          Override independently if you compile only one component from source.
      keepalived_log_facility:
        type: str
        required: false
        default: local1
        choices: [local0, local1, local2, local3, local4, local5, local6, local7]
        description: Syslog facility for Keepalived logs.
      keepalived_network_interface:
        type: str
        required: false
        default: eth0
        description: Interface for VRRP advertisements and the VIP.
      keepalived_unicast:
        type: bool
        required: false
        default: true
        description: Use unicast VRRP (cloud-friendly); requires the proxy_hosts group.
      keepalived_config_dir:
        type: str
        required: false
        default: /etc/keepalived
        description: Keepalived config directory.
      keepalived_vrrp_instances:
        type: list
        elements: dict
        required: true
        description: VRRP instances (one floating VIP each).
        options:
          vrrp_instance_name:
            type: str
            required: true
            description: Unique VRRP instance name.
          virtual_ipaddress:
            type: str
            required: true
            description: The floating VIP (plain or CIDR).
          virtual_router_id:
            type: int
            required: true
            description: VRRP router id, 1-255, unique per cluster.
          priority:
            type: int
            required: false
            description: VRRP priority override (default auto 100/90).
          state:
            type: str
            required: false
            choices: [MASTER, BACKUP]
            description: Initial VRRP state override (default auto).
      keepalived_peer_group:
        type: str
        required: false
        default: proxy_hosts
        description: Inventory group used for unicast peer auto-discovery.
      keepalived_unicast_peers:
        type: list
        elements: str
        required: false
        default: []
        description: Explicit unicast peer IPs overriding auto-discovery.
      keepalived_nopreempt:
        type: bool
        required: false
        default: false
        description: Disable preemption; forces state BACKUP on both nodes.
      keepalived_preempt_delay:
        type: int
        required: false
        description: Seconds to delay preemption (ignored when nopreempt is true).
      keepalived_advert_int:
        type: int
        required: false
        default: 1
        description: VRRP advertisement interval in seconds.
      keepalived_vrrp_version:
        type: int
        required: false
        default: 2
        choices: [2, 3]
        description: VRRP protocol version (use 3 for IPv6 VIPs).
      keepalived_garp_master_delay:
        type: int
        required: false
        description: Delay (s) before sending gratuitous ARP after becoming master.
      keepalived_garp_master_refresh:
        type: int
        required: false
        description: Interval (s) for periodic gratuitous ARP refresh.
      keepalived_haproxy_check_script:
        type: str
        required: false
        default: "/usr/bin/systemctl is-active --quiet haproxy"
        description: Command run by the VRRP track_script to check HAProxy health.
      keepalived_sync_groups:
        type: list
        elements: dict
        required: false
        default: []
        description: VRRP sync groups so multiple instances fail over together.
      cloud_floating_ip_enabled:
        type: bool
        required: false
        default: false
        description: Enable Hetzner Cloud floating IP failover.
      cloud_api_endpoint:
        type: str
        required: false
        default: "https://api.hetzner.cloud/v1"
        description: Hetzner Cloud API endpoint.
      cloud_api_token:
        type: str
        required: false
        default: ""
        no_log: true
        description: Hetzner Cloud API token (store in Vault).
      cloud_floating_ip_address:
        type: str
        required: false
        default: ""
        description: The floating IP to manage (Hetzner only).
      cloud_server_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description: Server name used in API lookups.
      cloud_floating_ip_interface:
        type: str
        required: false
        default: eth0
        description: Public interface the floating IP is added to.
      cloud_floating_ip_log:
        type: str
        required: false
        default: /var/log/cloud-floating-ip.log
        description: Log file path for the Floating IP notify script.

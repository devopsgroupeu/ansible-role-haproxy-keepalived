---
- name: Install Keepalived from distribution packages (Debian/Ubuntu)
  ansible.builtin.apt:
    name: keepalived
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts['os_family'] == 'Debian'

- name: Install Keepalived from distribution packages (RHEL family)
  ansible.builtin.dnf:
    name: keepalived
    state: present
  when: ansible_facts['os_family'] == 'RedHat'

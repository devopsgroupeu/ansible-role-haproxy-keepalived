---
# ============================================================================
# Variable Validation Tasks
# ============================================================================
# This file validates all required variables and configuration before
# proceeding with installation and configuration.
# ============================================================================

- name: Validate load balancer node identification
  ansible.builtin.assert:
    that:
      - loadbalancer_master is defined
      - loadbalancer_master | length > 0
      - loadbalancer_backup is defined
      - loadbalancer_backup | length > 0
      - loadbalancer_master != loadbalancer_backup
    fail_msg: |
      Load balancer master and backup must be defined and different.
      Current values:
        loadbalancer_master: '{{ loadbalancer_master }}'
        loadbalancer_backup: '{{ loadbalancer_backup }}'

      Please set these variables to the inventory_hostname of your proxy nodes.
      Example:
        loadbalancer_master: "proxy-master-01"
        loadbalancer_backup: "proxy-backup-01"
    success_msg: "Load balancer identification validated successfully"

- name: Validate HAProxy configuration
  when: haproxy_enabled | bool
  block:
    - name: Validate HAProxy version
      ansible.builtin.assert:
        that:
          - haproxy_version is defined
          - haproxy_version is version('2.0', '>=')
        fail_msg: "HAProxy version must be 2.0 or higher. Current: {{ haproxy_version | default('not set') }}"
        success_msg: "HAProxy version {{ haproxy_version }} is valid"

    - name: Validate HAProxy frontends and backends are defined
      when:
        - haproxy_config is not defined or haproxy_config | length == 0
      ansible.builtin.assert:
        that:
          - haproxy_frontends is defined or haproxy_backends is defined or haproxy_listens is defined
        fail_msg: |
          When haproxy_config is not set, you must define at least one of:
            - haproxy_frontends
            - haproxy_backends
            - haproxy_listens
        success_msg: "HAProxy configuration structure is valid"

    - name: Validate HAProxy stats credentials
      when: haproxy_stats | bool
      ansible.builtin.assert:
        that:
          - haproxy_stats_page_user | length > 0
          - haproxy_stats_page_pass | length > 0
          - haproxy_stats_page_pass != "admin"
        fail_msg: |
          HAProxy stats page credentials must be set and not use default password.
          Please set:
            haproxy_stats_page_user: "<your_username>"
            haproxy_stats_page_pass: "<strong_password>"
        success_msg: "HAProxy stats credentials are configured"
      ignore_errors: "{{ ansible_check_mode }}"

- name: Validate Keepalived configuration
  when: keepalived_enabled | bool
  block:
    - name: Validate Keepalived version
      ansible.builtin.assert:
        that:
          - keepalived_version is defined
          - keepalived_version is version('2.0', '>=')
        fail_msg: "Keepalived version must be 2.0 or higher. Current: {{ keepalived_version | default('not set') }}"
        success_msg: "Keepalived version {{ keepalived_version }} is valid"

    - name: Validate each VRRP instance configuration
      loop: "{{ keepalived_vrrp_instances }}"
      loop_control:
        label: "{{ item.vrrp_instance_name | default('unnamed') }}"
      ansible.builtin.assert:
        that:
          - item.virtual_ipaddress is match('^(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)(/([0-9]|[1-2][0-9]|3[0-2]))?$')
        fail_msg: |
          VRRP instance {{ item.vrrp_instance_name | default('unnamed') }}: virtual_ipaddress
          '{{ item.virtual_ipaddress | default('') }}' is not a valid IP address (with optional /prefix).
        success_msg: "VRRP instance {{ item.vrrp_instance_name }} virtual_ipaddress is valid"

    - name: Validate proxy_hosts group for unicast mode
      when: keepalived_unicast | default(true) | bool
      ansible.builtin.assert:
        that:
          - "'proxy_hosts' in groups"
          - "groups['proxy_hosts'] | length >= 2"
        fail_msg: |
          keepalived_unicast is enabled but the 'proxy_hosts' inventory group is missing or has fewer than 2 hosts.
          Unicast mode requires all load balancer nodes to be in the 'proxy_hosts' group for peer discovery.

          Add to your inventory:
            [proxy_hosts]
            {{ loadbalancer_master }} ansible_host=<master_ip>
            {{ loadbalancer_backup }} ansible_host=<backup_ip>
        success_msg: "proxy_hosts group validated for unicast mode ({{ groups['proxy_hosts'] | length }} hosts)"

    - name: Validate virtual_router_id uniqueness
      ansible.builtin.assert:
        that:
          - keepalived_vrrp_instances | map(attribute='virtual_router_id') | list | unique | length == keepalived_vrrp_instances | length
        fail_msg: |
          All virtual_router_id values must be unique within this role.
          Duplicate IDs detected: {{ keepalived_vrrp_instances | map(attribute='virtual_router_id') | list }}
        success_msg: "All virtual_router_id values are unique"

    - name: Validate failover invariant (no positive track-script weight)
      ansible.builtin.assert:
        that:
          - keepalived_haproxy_check_weight is not defined
        fail_msg: |
          keepalived_haproxy_check_weight is set, but this role uses clean
          FAULT-on-failure (no weight) so the VIP always migrates when HAProxy
          dies. A positive weight defeats failover; a negative weight is not
          supported here. Remove keepalived_haproxy_check_weight.
        success_msg: "Failover invariant satisfied (track script uses FAULT-on-failure)"

- name: Display configuration summary
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "Configuration Validation Complete"
      - "=========================================="
      - "Load Balancer Role: {{ 'MASTER' if inventory_hostname == loadbalancer_master else 'BACKUP' }}"
      - "HAProxy Enabled: {{ haproxy_enabled }}"
      - "HAProxy Version: {{ haproxy_version if haproxy_enabled else 'N/A' }}"
      - "Keepalived Enabled: {{ keepalived_enabled }}"
      - "Keepalived Version: {{ keepalived_version if keepalived_enabled else 'N/A' }}"
      - "Virtual IPs: {{ keepalived_vrrp_instances | map(attribute='virtual_ipaddress') | join(', ') if keepalived_enabled else 'N/A' }}"
      - "=========================================="

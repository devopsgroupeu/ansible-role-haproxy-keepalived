---
- name: Install HAProxy build toolchain (RHEL family)
  ansible.builtin.package:
    name:
      - make
      - gcc
      - lua-devel
      - openssl-devel
      - pcre2-devel
      - zlib-devel
    state: present
  when: ansible_facts['os_family'] == 'RedHat'

- name: Install HAProxy build toolchain (Debian/Ubuntu)
  ansible.builtin.package:
    name:
      - build-essential
      - gcc
      - liblua5.4-dev
      - libssl-dev
      - libpcre2-dev
      - zlib1g-dev
    state: present
  when: ansible_facts['os_family'] == 'Debian'

- name: Check HAProxy installation status (source)
  block:
    - name: Get installed HAProxy version
      ansible.builtin.command: "{{ haproxy_binary }} -v"
      register: haproxy_installed
      changed_when: false
      ignore_errors: true
      check_mode: false

    - name: Extract HAProxy version from output
      ansible.builtin.set_fact:
        installed_haproxy_version: "{{ (haproxy_installed.stdout | regex_search('HAProxy version (\\d+\\.\\d+\\.\\d+)', '\\1') | default([''], true)) | first }}"
      when:
        - haproxy_installed.rc == 0
        - haproxy_installed.stdout | length > 0
  rescue:
    - name: Set empty HAProxy version if not installed
      ansible.builtin.set_fact:
        installed_haproxy_version: ""

- name: Determine if HAProxy installation is required
  ansible.builtin.set_fact:
    haproxy_installation_required: >-
      {{ (installed_haproxy_version | default('') | length == 0)
         or (installed_haproxy_version is version(haproxy_version, '!=')) }}

- name: Install HAProxy from source if required
  when: haproxy_installation_required
  block:
    - name: Set HAProxy source filename vars
      ansible.builtin.set_fact:
        haproxy_major_minor: "{{ haproxy_version | regex_replace('^(\\d+\\.\\d+).*', '\\1') }}"
        haproxy_src_filename: "haproxy-{{ haproxy_version }}.tar.gz"

    - name: Require a source checksum (HAProxy)
      ansible.builtin.assert:
        that:
          - haproxy_src_sha256 | length > 0
        fail_msg: >-
          haproxy_install_method=source requires haproxy_src_sha256 (e.g.
          "sha256:<hex>" or a remote ".sha256" URL). Unverified source must
          not be compiled as root.
        success_msg: "HAProxy source checksum provided"

    - name: Copy pre-staged HAProxy source (offline)
      ansible.builtin.copy:
        src: "{{ haproxy_src_local_path }}"
        dest: "{{ haproxy_install_dir }}/{{ haproxy_src_filename }}"
        mode: "0644"
      when: haproxy_offline_install | bool
      notify:
        - Restart haproxy

    - name: Download HAProxy source on the target (online)
      ansible.builtin.get_url:
        url: "https://www.haproxy.org/download/{{ haproxy_major_minor }}/src/{{ haproxy_src_filename }}"
        dest: "{{ haproxy_install_dir }}/{{ haproxy_src_filename }}"
        mode: "0644"
        checksum: "{{ haproxy_src_sha256 }}"
      when: not (haproxy_offline_install | bool)
      notify:
        - Restart haproxy

    - name: Extract HAProxy source
      ansible.builtin.unarchive:
        src: "{{ haproxy_install_dir }}/{{ haproxy_src_filename }}"
        dest: "{{ haproxy_install_dir }}"
        remote_src: true
        creates: "{{ haproxy_install_dir }}/haproxy-{{ haproxy_version }}/Makefile"

    - name: Compile HAProxy
      ansible.builtin.command:
        cmd: "make {{ haproxy_make_flags | join(' ') }}"
      args:
        chdir: "{{ haproxy_install_dir }}/haproxy-{{ haproxy_version }}"
        creates: "{{ haproxy_install_dir }}/haproxy-{{ haproxy_version }}/haproxy"
      register: haproxy_compile
      changed_when: haproxy_compile.rc == 0

    # Always run make install when an install/upgrade is required (the enclosing
    # block only runs when the installed version differs). This self-heals a
    # prior run that compiled but failed before installing: the compile step is
    # then skipped via `creates:`, yet install still runs to completion.
    - name: Install HAProxy binaries
      ansible.builtin.command:
        cmd: make install
      args:
        chdir: "{{ haproxy_install_dir }}/haproxy-{{ haproxy_version }}"
      register: haproxy_install
      changed_when: haproxy_install.rc == 0

    - name: Generate systemd service HAProxy file
      ansible.builtin.command:
        cmd: make haproxy.service
      args:
        chdir: "{{ haproxy_install_dir }}/haproxy-{{ haproxy_version }}/admin/systemd"
        creates: "{{ haproxy_install_dir }}/haproxy-{{ haproxy_version }}/admin/systemd/haproxy.service"
      register: haproxy_systemd_gen
      changed_when: haproxy_systemd_gen.rc == 0

    - name: Deploy HAProxy systemd service
      ansible.builtin.copy:
        src: "{{ haproxy_install_dir }}/haproxy-{{ haproxy_version }}/admin/systemd/haproxy.service"
        dest: /etc/systemd/system/haproxy.service
        mode: "0644"
        remote_src: true
      notify: Reload systemd

- name: Remove HAProxy build toolchain after source install
  ansible.builtin.package:
    name:
      - gcc
      - make
    state: absent
  when:
    - haproxy_remove_build_deps | bool
    - haproxy_compile is defined and haproxy_compile is changed

# The source-built systemd unit starts HAProxy with `-f $CONFIG -f $CFGDIR`
# (CFGDIR=/etc/haproxy/conf.d). HAProxy refuses to start if that directory is
# missing, so ensure it exists for source installs (distro packages ship it).
- name: Ensure HAProxy conf.d directory exists (required by the source-built unit)
  ansible.builtin.file:
    path: "{{ haproxy_config_dir }}/conf.d"
    state: directory
    owner: root
    group: "{{ haproxy_group }}"
    mode: "0750"

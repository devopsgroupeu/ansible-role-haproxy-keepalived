---
- name: Prepare package-mode test environment
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Fix PAM authentication for Rocky Linux
      ansible.builtin.lineinfile:
        path: /etc/pam.d/su
        regexp: '^account\s+required\s+pam_access.so'
        state: absent
      when: ansible_os_family == 'RedHat'
      failed_when: false

    - name: Install iproute2 (Debian/Ubuntu)
      ansible.builtin.package:
        name: iproute2
        state: present
      when: ansible_os_family == 'Debian'

    - name: Install iproute (Rocky/RHEL)
      ansible.builtin.package:
        name: iproute
        state: present
      when: ansible_os_family == 'RedHat'

    - name: Ensure systemd-journald is running
      ansible.builtin.service:
        name: systemd-journald
        state: started

- name: Override keepalived service type for Docker
  hosts: proxy_hosts
  become: true
  gather_facts: false
  tasks:
    # The packaged keepalived runs Type=notify with --dont-fork. In a Docker
    # container, override to Type=simple so systemd does not wait on a fork that
    # never happens (keepalived stays in the foreground) and the service starts
    # cleanly in the molecule container environment.
    - name: Create keepalived systemd drop-in directory
      ansible.builtin.file:
        path: /etc/systemd/system/keepalived.service.d
        state: directory
        mode: "0755"

    - name: Override keepalived service type to simple for Docker
      ansible.builtin.copy:
        dest: /etc/systemd/system/keepalived.service.d/docker-compat.conf
        content: |
          [Service]
          Type=simple
        mode: "0644"

    - name: Reload systemd daemon
      ansible.builtin.systemd_service:
        daemon_reload: true

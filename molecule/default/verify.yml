---
# ============================================================================
# Molecule Verification Playbook
# ============================================================================
# This playbook verifies that the role installed and configured everything
# correctly.
# ============================================================================

- name: Verify HAProxy and Keepalived installation
  hosts: proxy_hosts
  become: true
  gather_facts: true
  tasks:
    # ========================================================================
    # HAProxy Verification
    # ========================================================================

    - name: Check if HAProxy is installed
      ansible.builtin.command: haproxy -v
      register: haproxy_version_check
      changed_when: false
      failed_when: haproxy_version_check.rc != 0

    - name: Verify HAProxy is installed (version check passes)
      ansible.builtin.assert:
        that:
          - haproxy_version_check.rc == 0
        fail_msg: "HAProxy is not installed or not executable"
        success_msg: "HAProxy is installed"

    - name: Locate the haproxy binary
      ansible.builtin.command: which haproxy
      register: haproxy_which
      changed_when: false

    - name: Assert HAProxy installed via package path (default install method)
      ansible.builtin.assert:
        that:
          - "'/usr/local/sbin' not in haproxy_which.stdout"
        fail_msg: "HAProxy is in /usr/local/sbin (source build); package mode expected by default"
        success_msg: "HAProxy installed from distro package"

    - name: Check if HAProxy service is running
      ansible.builtin.service_facts:

    - name: Verify HAProxy service status
      ansible.builtin.assert:
        that:
          - ansible_facts.services['haproxy.service'] is defined
          - ansible_facts.services['haproxy.service'].state == 'running'
          - ansible_facts.services['haproxy.service'].status == 'enabled'
        fail_msg: "HAProxy service is not running or enabled"
        success_msg: "HAProxy service is running and enabled"

    - name: Check HAProxy configuration file exists
      ansible.builtin.stat:
        path: /etc/haproxy/haproxy.cfg
      register: haproxy_config

    - name: Verify HAProxy configuration exists
      ansible.builtin.assert:
        that:
          - haproxy_config.stat.exists
        fail_msg: "HAProxy configuration file not found"
        success_msg: "HAProxy configuration file exists"

    - name: Validate HAProxy configuration syntax
      ansible.builtin.command: haproxy -c -f /etc/haproxy/haproxy.cfg
      changed_when: false
      register: haproxy_syntax_check

    - name: Verify HAProxy configuration is valid
      ansible.builtin.assert:
        that:
          - haproxy_syntax_check.rc == 0
        fail_msg: "HAProxy configuration syntax is invalid"
        success_msg: "HAProxy configuration syntax is valid"

    - name: Check HAProxy stats page responds
      ansible.builtin.uri:
        url: http://localhost:1936/haproxy/stats
        user: admin
        password: "{{ haproxy_stats_page_pass }}"
        force_basic_auth: true
        status_code: 200
      register: stats_check
      retries: 3
      delay: 2

    # ========================================================================
    # HAP-21: Stats bound to loopback, admin off by default
    # ========================================================================

    - name: Read rendered HAProxy config
      ansible.builtin.slurp:
        src: /etc/haproxy/haproxy.cfg
      register: hap_cfg_stats

    - name: Verify stats are admin-locked and bound to loopback by default
      ansible.builtin.assert:
        that:
          - "'stats admin if TRUE' not in (hap_cfg_stats.content | b64decode)"
          - "'bind 127.0.0.1:1936' in (hap_cfg_stats.content | b64decode)"
        fail_msg: "Stats listen must default to 127.0.0.1 and must not enable admin"
        success_msg: "Stats hardened: loopback bind, admin off"

    # ========================================================================
    # HAP-24: http-server-close not in default options
    # ========================================================================

    - name: Verify http-server-close is not in default options
      ansible.builtin.assert:
        that:
          - "'option http-server-close' not in (hap_cfg_stats.content | b64decode)"
        fail_msg: "http-server-close should not be a default option"
        success_msg: "http-server-close not present by default"

    # ========================================================================
    # HAP-25: ACL content routing and rule sets
    # ========================================================================

    - name: Verify content routing and rule sets render
      ansible.builtin.assert:
        that:
          - "'acl is_health path /healthz' in (hap_cfg_stats.content | b64decode)"
          - "'use_backend test_backend if is_health' in (hap_cfg_stats.content | b64decode)"
          - "'http-request set-header X-Test 1' in (hap_cfg_stats.content | b64decode)"
          - "'http-response set-header X-Frame-Options DENY' in (hap_cfg_stats.content | b64decode)"
        fail_msg: "ACL/use_backend/http rule sets did not render"
        success_msg: "Content routing and rule sets rendered"

    # ========================================================================
    # HAP-22: Hitless-reload prerequisites in global
    # ========================================================================

    - name: Verify hitless-reload prerequisites in global
      ansible.builtin.assert:
        that:
          - "'expose-fd listeners' in (hap_cfg_stats.content | b64decode)"
          - "'hard-stop-after 30s' in (hap_cfg_stats.content | b64decode)"
          - "'/run/haproxy/admin.sock' in (hap_cfg_stats.content | b64decode)"
        fail_msg: "Global must declare admin socket (outside chroot) + hard-stop-after"
        success_msg: "Hitless-reload prerequisites present"

    # ========================================================================
    # HAP-16: Source-specific build deps absent in package mode
    # Note: the geerlingguy base image ships gcc/build-essential pre-installed.
    # We assert the role-specific source deps (liblua5.4-dev, libpcre2-dev)
    # were NOT installed — those are only added by haproxy_install_source.yml.
    # ========================================================================

    - name: Check for liblua5.4-dev (source-only HAProxy build dep)
      ansible.builtin.command: dpkg -s liblua5.4-dev
      register: lua_dev_pkg
      changed_when: false
      failed_when: false

    - name: Assert source-specific build deps absent in package mode
      ansible.builtin.assert:
        that:
          - lua_dev_pkg.rc != 0
        fail_msg: "liblua5.4-dev is installed in package mode; source build deps should be source-only"
        success_msg: "Source-specific build toolchain absent in package mode"
      when: ansible_facts['os_family'] == 'Debian'

    # ========================================================================
    # Keepalived Verification
    # ========================================================================

    - name: Check if Keepalived is installed
      ansible.builtin.command: keepalived --version
      register: keepalived_version_check
      changed_when: false
      failed_when: keepalived_version_check.rc != 0

    - name: Verify Keepalived is installed (version check passes)
      ansible.builtin.assert:
        that:
          - keepalived_version_check.rc == 0
        fail_msg: "Keepalived is not installed"
        success_msg: "Keepalived is installed"

    - name: Check if Keepalived service is running
      ansible.builtin.assert:
        that:
          - ansible_facts.services['keepalived.service'] is defined
          - ansible_facts.services['keepalived.service'].state == 'running'
          - ansible_facts.services['keepalived.service'].status == 'enabled'
        fail_msg: "Keepalived service is not running or enabled"
        success_msg: "Keepalived service is running and enabled"

    - name: Check Keepalived configuration file exists
      ansible.builtin.stat:
        path: /etc/keepalived/keepalived.conf
      register: keepalived_config

    - name: Verify Keepalived configuration exists
      ansible.builtin.assert:
        that:
          - keepalived_config.stat.exists
        fail_msg: "Keepalived configuration file not found"
        success_msg: "Keepalived configuration file exists"

    - name: Validate Keepalived configuration
      ansible.builtin.command: keepalived -t
      changed_when: false
      register: keepalived_syntax_check
      failed_when: keepalived_syntax_check.rc != 0

    - name: Read generated keepalived.conf
      ansible.builtin.slurp:
        src: /etc/keepalived/keepalived.conf
      register: keepalived_conf_raw

    - name: Assert vrrp_script has no positive weight (KV-1 failover invariant)
      ansible.builtin.assert:
        that:
          - "'weight' not in (keepalived_conf_raw.content | b64decode)"
        fail_msg: >-
          keepalived.conf contains a 'weight' directive on the track script;
          a positive weight defeats failover (master keeps VIP when HAProxy dies).
        success_msg: "vrrp_script uses clean FAULT-on-failure (no weight)"

    # Alias for HAP-26/28 tasks that reference ka_cfg register name
    - name: Read rendered keepalived config (ka_cfg alias)
      ansible.builtin.slurp:
        src: /etc/keepalived/keepalived.conf
      register: ka_cfg

    # ========================================================================
    # HAP-26: vrrp_sync_group, nopreempt, advert_int, garp tunables
    # ========================================================================

    - name: Verify sync group, nopreempt and VRRP tunables render
      ansible.builtin.assert:
        that:
          - "'vrrp_sync_group SG_TEST' in (ka_cfg.content | b64decode)"
          - "'nopreempt' in (ka_cfg.content | b64decode)"
          - "'advert_int 2' in (ka_cfg.content | b64decode)"
          - "'garp_master_delay 5' in (ka_cfg.content | b64decode)"
          - "'state MASTER' not in (ka_cfg.content | b64decode)"
        fail_msg: "Sync group / nopreempt / tunables not rendered, or MASTER state forced under nopreempt"
        success_msg: "VRRP sync group + flap-control tunables rendered"

    # ========================================================================
    # HAP-27: Configurable peer group rendered
    # ========================================================================

    - name: Verify unicast peer block is rendered
      ansible.builtin.assert:
        that:
          - "'unicast_peer' in (ka_cfg.content | b64decode)"
          - "(ka_cfg.content | b64decode).count('unicast_peer') >= 1"
        fail_msg: "Unicast peer block missing"
        success_msg: "Unicast peer block rendered"

    # ========================================================================
    # HAP-28: Health check uses absolute systemctl path
    # ========================================================================

    - name: Verify health check uses absolute systemctl
      ansible.builtin.assert:
        that:
          - "'/usr/bin/systemctl is-active --quiet haproxy' in (ka_cfg.content | b64decode)"
          - "'service haproxy status' not in (ka_cfg.content | b64decode)"
        fail_msg: "Health check must use absolute systemctl path, not 'service haproxy status'"
        success_msg: "Health check uses absolute systemctl"

    # ========================================================================
    # HAP-33: Raw hooks, errorfiles, resolvers, VRRP auth render
    # ========================================================================

    - name: Verify raw hooks, errorfiles, resolvers, VRRP auth render
      ansible.builtin.assert:
        that:
          - "'tune.ssl.default-dh-param 2048' in (hap_cfg_stats.content | b64decode)"
          - "'peers mypeers' in (hap_cfg_stats.content | b64decode)"
          - "'errorfile 503 /etc/haproxy/errors/503.http' in (hap_cfg_stats.content | b64decode)"
          - "'resolvers dns' in (hap_cfg_stats.content | b64decode)"
          - "'authentication' in (ka_cfg.content | b64decode)"
          - "'auth_type PASS' in (ka_cfg.content | b64decode)"
        fail_msg: "LOW-item features did not render"
        success_msg: "Raw hooks / errorfiles / resolvers / VRRP auth rendered"

    - name: Count running keepalived processes
      ansible.builtin.command: pgrep -x keepalived
      register: keepalived_pids
      changed_when: false

    - name: Assert keepalived drop-in sets the log facility (no --log-facility command)
      ansible.builtin.stat:
        path: /etc/systemd/system/keepalived.service.d/override.conf
      register: keepalived_dropin

    - name: Verify single keepalived process group and drop-in present
      ansible.builtin.assert:
        that:
          - keepalived_dropin.stat.exists
        fail_msg: "keepalived log facility not set via systemd drop-in"
        success_msg: "keepalived facility set via drop-in; no stray daemon"

    - name: Assert Reload handlers are defined in the role
      ansible.builtin.command: >-
        grep -q "Reload haproxy" {{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/handlers/main.yml
      delegate_to: localhost
      become: false
      run_once: true
      changed_when: false
      register: reload_handler_grep
      failed_when: reload_handler_grep.rc != 0

    - name: Read HAProxy rsyslog config
      ansible.builtin.slurp:
        src: /etc/rsyslog.d/haproxy.conf
      register: haproxy_rsyslog_raw

    - name: Assert rsyslog captures the configured HAProxy facility
      ansible.builtin.assert:
        that:
          - "'local2.' in (haproxy_rsyslog_raw.content | b64decode)"
        fail_msg: >-
          rsyslog captures a facility that does not match haproxy_log_facility
          (local2); HAProxy logs are silently dropped.
        success_msg: "rsyslog captures the configured HAProxy facility"

    # ========================================================================
    # HAP-22: ip_nonlocal_bind set via sysctl drop-in
    # ========================================================================

    - name: Check ip_nonlocal_bind sysctl drop-in
      ansible.builtin.stat:
        path: /etc/sysctl.d/60-keepalived.conf
      register: nonlocal_dropin

    - name: Read live ip_nonlocal_bind value
      ansible.builtin.command: sysctl -n net.ipv4.ip_nonlocal_bind
      register: nonlocal_live
      changed_when: false

    - name: Assert ip_nonlocal_bind set via drop-in and active
      ansible.builtin.assert:
        that:
          - nonlocal_dropin.stat.exists
          - nonlocal_live.stdout | trim == '1'
        fail_msg: "ip_nonlocal_bind not set via /etc/sysctl.d drop-in or not active"
        success_msg: "ip_nonlocal_bind set declaratively and active"

    # ========================================================================
    # Directory and File Permissions
    # ========================================================================

    - name: Check HAProxy socket directory exists
      ansible.builtin.stat:
        path: /var/lib/haproxy
      register: socket_dir

    - name: Verify socket directory
      ansible.builtin.assert:
        that:
          - socket_dir.stat.exists
          - socket_dir.stat.isdir
        fail_msg: "HAProxy socket directory not found"
        success_msg: "HAProxy socket directory exists"

    - name: Check certificate directory exists
      ansible.builtin.stat:
        path: /etc/haproxy/certs
      register: cert_dir

    - name: Verify certificate directory
      ansible.builtin.assert:
        that:
          - cert_dir.stat.exists
          - cert_dir.stat.isdir
        fail_msg: "Certificate directory not found"
        success_msg: "Certificate directory exists"

    # ========================================================================
    # Log Files
    # ========================================================================

    - name: Check rsyslog configuration for HAProxy
      ansible.builtin.stat:
        path: /etc/rsyslog.d/haproxy.conf
      register: haproxy_rsyslog

    - name: Verify rsyslog HAProxy configuration
      ansible.builtin.assert:
        that:
          - haproxy_rsyslog.stat.exists
        fail_msg: "HAProxy rsyslog configuration not found"
        success_msg: "HAProxy rsyslog configuration exists"

    - name: Check rsyslog configuration for Keepalived
      ansible.builtin.stat:
        path: /etc/rsyslog.d/keepalived.conf
      register: keepalived_rsyslog

    - name: Verify rsyslog Keepalived configuration
      ansible.builtin.assert:
        that:
          - keepalived_rsyslog.stat.exists
        fail_msg: "Keepalived rsyslog configuration not found"
        success_msg: "Keepalived rsyslog configuration exists"

- name: Verify VIP assignment on master
  hosts: proxy-master
  become: true
  tasks:
    - name: Wait for VIP to be assigned
      ansible.builtin.wait_for:
        timeout: 10
      delegate_to: localhost
      become: false
      # nopreempt: VIP will be claimed by whichever node wins election; skip assertion
      when: not (keepalived_nopreempt | default(false) | bool)

    - name: Check if VIP is assigned
      ansible.builtin.command: ip addr show
      register: ip_check
      changed_when: false
      when: not (keepalived_nopreempt | default(false) | bool)

    - name: Verify VIP is present on master
      ansible.builtin.assert:
        that:
          - "'172.18.0.100' in ip_check.stdout"
        fail_msg: "Virtual IP not found on master node"
        success_msg: "Virtual IP is assigned to master node"
      when: not (keepalived_nopreempt | default(false) | bool)

- name: Display test summary
  hosts: proxy_hosts
  gather_facts: false
  tasks:
    - name: Test summary
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "All verification tests passed!"
          - "=========================================="
          - "HAProxy: Installed and running"
          - "Keepalived: Installed and running"
          - "VIP: Assigned to master node"
          - "Configuration: Valid and active"
          - "=========================================="
      run_once: true

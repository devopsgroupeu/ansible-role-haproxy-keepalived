---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  # Master proxy node
  # privileged + CAP_NET_ADMIN required: keepalived binds/unbinds the VRRP VIP
  # on the interface. Without privileged mode, ip addr add fails inside Docker.
  - name: proxy-master
    image: geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2404}-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
    networks:
      # NOTE: VIP 172.18.0.100 assumes molecule-default-net on the default docker
      # bridge subnet (172.18.0.0/16). Adjust the VIP if your docker net differs.
      # Isolated per-scenario network prevents teardown collision with other scenarios.
      - name: molecule-default-net
    groups:
      - proxy_hosts

  # Backup proxy node
  - name: proxy-backup
    image: geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2404}-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
    networks:
      - name: molecule-default-net
    groups:
      - proxy_hosts

  # Backend web server for testing
  - name: backend1
    image: geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2404}-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
    networks:
      - name: molecule-default-net
    groups:
      - backend_servers

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
      callbacks_enabled: profile_tasks, timer
      stdout_callback: default
    ssh_connection:
      pipelining: false
  inventory:
    # Fixture variables live in molecule/default/group_vars/all.yml (DRY).
    # The links key symlinks group_vars/ into molecule's ephemeral inventory dir.
    links:
      group_vars: group_vars

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy

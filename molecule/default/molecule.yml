---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  # Master proxy node
  - name: proxy-master
    image: geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2404}-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
    networks:
      - name: molecule-network
    groups:
      - proxy_hosts

  # Backup proxy node
  - name: proxy-backup
    image: geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2404}-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
    networks:
      - name: molecule-network
    groups:
      - proxy_hosts

  # Backend web server for testing
  - name: backend1
    image: geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2404}-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
    networks:
      - name: molecule-network
    groups:
      - backend_servers

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
      callbacks_enabled: profile_tasks, timer
      stdout_callback: default
    ssh_connection:
      pipelining: false
  inventory:
    group_vars:
      all:
        loadbalancer_master: "proxy-master"
        loadbalancer_backup: "proxy-backup"
        haproxy_enabled: true
        haproxy_version: "3.4.0"
        haproxy_stats: true
        haproxy_stats_page_pass: "test_password_123"
        keepalived_enabled: true
        keepalived_version: "2.3.4"
        keepalived_network_interface: eth0
        keepalived_peer_group: proxy_hosts
        keepalived_nopreempt: true
        keepalived_advert_int: 2
        keepalived_garp_master_delay: 5
        keepalived_vrrp_instances:
          - vrrp_instance_name: VI_TEST
            virtual_ipaddress: "172.18.0.100"
            virtual_router_id: 51
          - vrrp_instance_name: VI_TEST2
            virtual_ipaddress: "172.18.0.101"
            virtual_router_id: 52
        keepalived_sync_groups:
          - name: SG_TEST
            instances:
              - VI_TEST
              - VI_TEST2
        haproxy_frontends:
          - name: test_http_frontend
            address: "*"
            port: 8080
            default_backend: test_backend
            mode: http
            acls:
              - "is_health path /healthz"
            use_backends:
              - backend: test_backend
                condition: "if is_health"
            http_request_rules:
              - "set-header X-Test 1"
            http_response_rules:
              - "set-header X-Frame-Options DENY"
        haproxy_backends:
          - name: test_backend
            balance: roundrobin
            mode: http
            servers:
              - backend1
            port: 80
            options:
              - check

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy

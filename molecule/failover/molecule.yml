---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  # Master node - privileged + CAP_NET_ADMIN required: keepalived binds/unbinds
  # the VRRP VIP on the interface. Two nodes on a shared network to exercise
  # unicast VRRP and real VIP migration between containers.
  - name: fo-master
    image: geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2404}-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
    networks:
      # Isolated per-scenario network; VIP 172.18.0.200 on the default bridge /16.
      - name: molecule-failover-net
    groups:
      - proxy_hosts

  # Backup node
  - name: fo-backup
    image: geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2404}-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
    networks:
      - name: molecule-failover-net
    groups:
      - proxy_hosts

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
    ssh_connection:
      pipelining: false
  inventory:
    group_vars:
      all:
        haproxy_loadbalancer_master: "fo-master"
        haproxy_loadbalancer_backup: "fo-backup"
        haproxy_install_method: package
        keepalived_install_method: package
        haproxy_stats_page_pass: "test_password_123456"
        keepalived_network_interface: eth0
        keepalived_nopreempt: true
        keepalived_vrrp_instances:
          - vrrp_instance_name: VI_FO
            virtual_ipaddress: "172.18.0.200"
            virtual_router_id: 60
        haproxy_frontends:
          - name: fe
            address: "*"
            port: 8080
            default_backend: be
            mode: http
        haproxy_backends:
          - name: be
            mode: http
            balance: roundrobin
            servers:
              - name: app1
                address: 127.0.0.1
                port: 9

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy

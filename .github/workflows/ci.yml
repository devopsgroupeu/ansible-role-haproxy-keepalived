---
name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feat/**"
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run yamllint
        run: python -m yamllint .

      - name: Run ansible-lint
        run: ansible-lint --profile production .

  molecule:
    name: molecule (${{ matrix.distro }} / ${{ matrix.scenario }})
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      # CI tests the container-reliable matrix (Debian + Ubuntu) on the
      # deterministic install scenarios. EL9 is a supported platform validated
      # on real hosts (RockyLinux containers have known sudo/PAM quirks). The
      # `failover` scenario performs real VRRP VIP migration and is validated
      # locally / on real hosts (VRRP election is unreliable in CI container
      # networking) — run `molecule test -s failover` to validate it.
      matrix:
        distro:
          - ubuntu2404
          - debian12
          - debian13
        scenario:
          - default
          - package
          - ssl
          - cloud-fip
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: pip install -r requirements.txt

      - name: Run molecule
        run: molecule test -s ${{ matrix.scenario }}
        env:
          MOLECULE_DISTRO: ${{ matrix.distro }}
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"

  ci-success:
    name: ci-success
    runs-on: ubuntu-latest
    needs: [lint, molecule]
    if: always()
    steps:
      - name: Fail if any required job did not succeed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "A required CI job (lint or molecule) did not succeed."
          exit 1
      - name: Confirm required jobs passed
        run: echo "lint + molecule succeeded"
